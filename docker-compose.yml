services:

  backend:
    build: .
    container_name: authforge_backend

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - JWT_SECRET=mysecret
      - MONGO_URI=mongodb://mongo:27017/authforge

    depends_on:
      - mongo

  mongo:
    image: mongo:8
    container_name: authforge_mongo

    ports:
      - "27017:27017"